name: Setup PROJ
description: Install the native prerequisites needed for bundled PROJ builds.

runs:
  using: composite
  steps:
    - name: Install PROJ prerequisites on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libtiff-dev pkg-config

    - name: Install PROJ prerequisites on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: brew install libtiff

    - name: Install PROJ prerequisites on Windows
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-libtiff

    - name: Configure PROJ discovery on Windows
      if: runner.os == 'Windows'
      shell: bash
      run: |
        wrapper_dir="$(cygpath -u "$RUNNER_TEMP")/proj-cmake-wrapper"
        wrapper_path="$(cygpath -w "$wrapper_dir")"
        wrapper_cmd="${wrapper_path}\\cmake.cmd"
        sqlite_cmd="$(cygpath -m "$wrapper_dir/sqlite3.cmd")"
        mkdir -p "$wrapper_dir"
        {
          printf '@echo off\r\n'
          printf 'setlocal\r\n'
          printf 'set "PATH=C:\\msys64\\mingw64\\bin;C:\\mingw64\\bin;C:\\msys64\\usr\\bin;%%PATH%%"\r\n'
          printf 'set "REAL_SQLITE=C:\\msys64\\mingw64\\bin\\sqlite3.exe"\r\n'
          printf 'if not exist "%%REAL_SQLITE%%" set "REAL_SQLITE=C:\\mingw64\\bin\\sqlite3.exe"\r\n'
          printf 'if not exist "%%REAL_SQLITE%%" set "REAL_SQLITE=sqlite3.exe"\r\n'
          printf 'call "%%REAL_SQLITE%%" %%*\r\n'
          printf 'exit /b %%ERRORLEVEL%%\r\n'
        } > "$wrapper_dir/sqlite3.cmd"
        {
          printf '@echo off\r\n'
          printf 'setlocal\r\n'
          printf 'set "PATH=C:\\msys64\\mingw64\\bin;C:\\mingw64\\bin;C:\\msys64\\usr\\bin;%%PATH%%"\r\n'
          printf 'set "REAL_CMAKE=C:\\msys64\\mingw64\\bin\\cmake.exe"\r\n'
          printf 'if not exist "%%REAL_CMAKE%%" set "REAL_CMAKE=C:\\mingw64\\bin\\cmake.exe"\r\n'
          printf 'if not exist "%%REAL_CMAKE%%" set "REAL_CMAKE=C:\\Program Files\\CMake\\bin\\cmake.exe"\r\n'
          printf 'if "%%~1"=="--build" goto passthrough\r\n'
          printf 'if "%%~1"=="--install" goto passthrough\r\n'
          printf 'if "%%~1"=="--version" goto passthrough\r\n'
          printf 'if "%%~1"=="-E" goto passthrough\r\n'
          printf 'call "%%REAL_CMAKE%%" ^\r\n'
          printf '  -DEXE_SQLITE3=__SQLITE_CMD__ ^\r\n'
          printf '  -DTIFF_INCLUDE_DIR=C:/msys64/mingw64/include ^\r\n'
          printf '  -DTIFF_LIBRARY=C:/msys64/mingw64/lib/libtiff.dll.a ^\r\n'
          printf '  %%*\r\n'
          printf 'exit /b %%ERRORLEVEL%%\r\n'
          printf ':passthrough\r\n'
          printf 'call "%%REAL_CMAKE%%" %%*\r\n'
          printf 'exit /b %%ERRORLEVEL%%\r\n'
        } > "$wrapper_dir/cmake.cmd"
        sed -i "s#__SQLITE_CMD__#$sqlite_cmd#g" "$wrapper_dir/cmake.cmd"
        {
          echo "$wrapper_path"
          echo 'C:\msys64\mingw64\bin'
        } >> "$GITHUB_PATH"
        {
          echo 'CMAKE_PREFIX_PATH=C:/msys64/mingw64'
          echo 'CMAKE_INCLUDE_PATH=C:/msys64/mingw64/include'
          echo 'CMAKE_LIBRARY_PATH=C:/msys64/mingw64/lib'
          echo "CMAKE=$wrapper_cmd"
          echo "TARGET_CMAKE=$wrapper_cmd"
          echo "CMAKE_x86_64_pc_windows_gnu=$wrapper_cmd"
          echo 'PKG_CONFIG_PATH=C:/msys64/mingw64/lib/pkgconfig'
        } >> "$GITHUB_ENV"
