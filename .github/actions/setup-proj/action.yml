name: Setup PROJ
description: Install the native prerequisites needed for bundled PROJ builds.

runs:
  using: composite
  steps:
    - name: Install PROJ prerequisites on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y libtiff-dev pkg-config

    - name: Install PROJ prerequisites on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: brew install libtiff

    - name: Install PROJ prerequisites on Windows
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        path-type: inherit
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-pkgconf
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-libtiff

    - name: Configure PROJ discovery on Windows
      if: runner.os == 'Windows'
      shell: bash
      run: |
        wrapper_dir="$(cygpath -u "$RUNNER_TEMP")/proj-cmake-wrapper"
        wrapper_path="$(cygpath -w "$wrapper_dir")"
        mkdir -p "$wrapper_dir"
        cat > "$wrapper_dir/cmake.cmd" <<'EOF'
        @echo off
        setlocal
        set "REAL_CMAKE=C:\msys64\mingw64\bin\cmake.exe"
        if not exist "%REAL_CMAKE%" set "REAL_CMAKE=C:\Program Files\CMake\bin\cmake.exe"

        if "%~1"=="--build" goto passthrough
        if "%~1"=="--install" goto passthrough
        if "%~1"=="--version" goto passthrough
        if "%~1"=="-E" goto passthrough

        "%REAL_CMAKE%" ^
          -DEXE_SQLITE3=C:/msys64/mingw64/bin/sqlite3.exe ^
          -DTIFF_INCLUDE_DIR=C:/msys64/mingw64/include ^
          -DTIFF_LIBRARY=C:/msys64/mingw64/lib/libtiff.dll.a ^
          %*
        exit /b %ERRORLEVEL%

        :passthrough
        "%REAL_CMAKE%" %*
        exit /b %ERRORLEVEL%
        EOF
        {
          echo "$wrapper_path"
          echo 'C:\msys64\mingw64\bin'
        } >> "$GITHUB_PATH"
        {
          echo 'CMAKE_PREFIX_PATH=C:/msys64/mingw64'
          echo 'CMAKE_INCLUDE_PATH=C:/msys64/mingw64/include'
          echo 'CMAKE_LIBRARY_PATH=C:/msys64/mingw64/lib'
          echo 'PKG_CONFIG_PATH=C:/msys64/mingw64/lib/pkgconfig'
        } >> "$GITHUB_ENV"
